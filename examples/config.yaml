# Crazy Pumpkin OS — Example Configuration
# Copy this file and customize for your company.

company:
  name: "My AI Company"

products:
  - name: "MyApp"
    workspace: "./products/myapp"      # relative to project root
    source_dir: "src"
    test_dir: "tests"
    test_command: "python -m pytest tests/ -v --tb=short"
    git_branch: "main"
    auto_pm: false                     # set true to auto-generate goals for idle products

llm:
  default_provider: anthropic_api
  providers:
    anthropic_api:
      api_key: ${ANTHROPIC_API_KEY}    # reads from environment variable
    # openai_api:
    #   api_key: ${OPENAI_API_KEY}
    # ollama:
    #   base_url: http://localhost:11434

  # Which model each agent role uses
  agent_models:
    developer:  { model: sonnet }
    strategist: { model: claude-sonnet-4-6 }
    reviewer:   { model: claude-sonnet-4-6 }
    architect:  { model: claude-sonnet-4-6 }
    strategy_agent: { model: claude-sonnet-4-6 }

agents:
  # Canonical 3-agent roster
  - name: "developer"
    role: execution
    class: crazypumpkin.agents.developer.DeveloperAgent
    model: sonnet
    group: execution
    trigger: "backlog > 0"
    description: "Executes tasks — writes code, runs tests"

  - name: "reviewer"
    role: reviewer
    class: crazypumpkin.agents.reviewer.ReviewerAgent
    model: sonnet
    group: review
    trigger: "submitted_for_review > 0"
    description: "Reviews submitted code for quality and correctness"

  - name: "strategist"
    role: strategy
    class: crazypumpkin.agents.strategist.StrategistAgent
    model: sonnet
    group: execution
    trigger: "idle_products > 0"
    description: "Ingests goals, creates projects, breaks into tasks"

  # Retry policy applied to agent LLM calls on transient failures
  retry:
    max_attempts: 3
    base_delay: 1.0
    max_delay: 60
    backoff_factor: 2

pipeline:
  cycle_interval: 30       # seconds between cycles
  task_timeout_sec: 3600   # max time for a single task
  task_escalation_retries: 2

notifications:
  providers: []
  # - type: telegram
  #   token: ${TELEGRAM_BOT_TOKEN}
  #   chat_id: ${TELEGRAM_CHAT_ID}
  # - type: slack
  #   webhook_url: ${SLACK_WEBHOOK_URL}
  # - type: webhook
  #   url: https://my-server.com/hooks/crazypumpkin

dashboard:
  port: 8500
  host: "127.0.0.1"
  password: ${DASHBOARD_PASSWORD}      # leave empty for open access

voice:
  enabled: false
  # provider: openai_realtime
  # api_key: ${OPENAI_API_KEY}
